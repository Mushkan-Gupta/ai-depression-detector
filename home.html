<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>MindEase | Emotional Space</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/home.css">
</head>

<body onload="checkAuth()">

<header class="glass-header">
  <h2>MindEase</h2>
  <div class="actions">
    <button id="themeToggle">🌗</button>
   <button class="logout" onclick="logout()">Logout</button>

  </div>
</header>

<!-- AURORA BACKGROUND -->
<div class="aurora"></div>

<!-- CALM MUSIC FLOAT -->
<div class="music-orb" onclick="toggleMusic()">🎧</div>
<audio id="calmMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">
</audio>

<!-- MAIN EXPERIENCE -->
<main class="space">

  <!-- AI ORB -->
  <div class="ai-orb" id="aiOrb">
    <span>AI</span>
  </div>

  <!-- CHAT FLOW -->
  <div class="chat-flow" id="messages">
    <div class="msg bot">
      Hi 🌸  
      I’m here with you.  
      You’re safe here.
    </div>
  </div>

</main>

<!-- INPUT DOCK -->
<div class="input-dock">
  <button onclick="startListening()">🎙</button>
  <input id="userInput" placeholder="Say what your heart feels…" />
  <button class="send" onclick="sendMessage()">➤</button>
</div>

<!-- <footer class="floating-footer">
  © 2026 MindEase · Mental Health Matters
</footer> -->


<script src="js/chat.js"></script>
<script src="js/theme.js"></script>
</body>
</html>
