<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindEase | Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in or create your MindEase account to save your mental health journal entries and track your emotional wellbeing over time.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/auth.css">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="auth-body">

  <!-- AMBIENT AURORA BACKGROUND -->
  <div class="aurora" aria-hidden="true"></div>
  <div class="aurora-secondary" aria-hidden="true"></div>

  <!-- HEADER -->
  <header class="auth-header">
    <a href="index.html" class="logo-mark auth-logo" aria-label="Go to MindEase home">
      <span class="logo-icon">🌿</span>
      <span class="logo-text">MindEase</span>
    </a>
    <button class="theme-btn" id="authThemeToggle" aria-label="Toggle theme">🌙</button>
  </header>

  <!-- AUTH CARD CONTAINER -->
  <main class="auth-main">
    <div class="auth-card" id="authCard">

      <!-- === LOGIN PANEL === -->
      <div class="auth-panel" id="loginPanel">
        <div class="auth-panel-header">
          <div class="auth-icon-ring">
            <span class="auth-icon">🔐</span>
          </div>
          <h1 class="auth-title">Welcome Back</h1>
          <p class="auth-subtitle">Sign in to continue your journey</p>
        </div>

        <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)" novalidate>
          <div class="form-group">
            <label for="loginEmail" class="form-label">Email Address</label>
            <div class="input-wrapper">
              <span class="input-icon">✉️</span>
              <input
                type="email"
                id="loginEmail"
                class="form-input"
                placeholder="you@example.com"
                autocomplete="email"
                required
              >
            </div>
            <div class="field-error" id="loginEmailError"></div>
          </div>

          <div class="form-group">
            <label for="loginPassword" class="form-label">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input
                type="password"
                id="loginPassword"
                class="form-input"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              >
              <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)" aria-label="Show/hide password">👁</button>
            </div>
            <div class="field-error" id="loginPasswordError"></div>
          </div>

          <div class="form-error-banner hidden" id="loginErrorBanner"></div>

          <button type="submit" class="auth-btn" id="loginBtn">
            <span class="auth-btn-text">Sign In</span>
            <span class="auth-btn-spinner hidden" id="loginSpinner">
              <span class="spinner-dot"></span>
              <span class="spinner-dot"></span>
              <span class="spinner-dot"></span>
            </span>
          </button>
        </form>

        <!-- Google Sign-In -->
        <div class="google-divider"><span>or</span></div>
        <button class="google-btn" id="loginGoogleBtn" onclick="handleGoogleSignIn()" type="button">
          <svg class="google-logo" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          <span class="google-btn-text">Continue with Google</span>
          <span class="google-btn-spinner hidden" id="loginGoogleSpinner">
            <span class="spinner-dot"></span>
            <span class="spinner-dot"></span>
            <span class="spinner-dot"></span>
          </span>
        </button>

        <div class="auth-divider">
          <span>New to MindEase?</span>
        </div>
        <button class="auth-switch-btn" onclick="switchToRegister()">
          Create a free account →
        </button>
      </div>

      <!-- === REGISTER PANEL === -->
      <div class="auth-panel hidden" id="registerPanel">
        <div class="auth-panel-header">
          <div class="auth-icon-ring">
            <span class="auth-icon">🌱</span>
          </div>
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-subtitle">Start your mental wellness journey</p>
        </div>

        <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)" novalidate>
          <div class="form-group">
            <label for="registerName" class="form-label">Full Name</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input
                type="text"
                id="registerName"
                class="form-input"
                placeholder="Your name"
                autocomplete="name"
                required
              >
            </div>
            <div class="field-error" id="registerNameError"></div>
          </div>

          <div class="form-group">
            <label for="registerEmail" class="form-label">Email Address</label>
            <div class="input-wrapper">
              <span class="input-icon">✉️</span>
              <input
                type="email"
                id="registerEmail"
                class="form-input"
                placeholder="you@example.com"
                autocomplete="email"
                required
              >
            </div>
            <div class="field-error" id="registerEmailError"></div>
          </div>

          <div class="form-group">
            <label for="registerPassword" class="form-label">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input
                type="password"
                id="registerPassword"
                class="form-input"
                placeholder="Min 8 chars, upper, lower, digit"
                autocomplete="new-password"
                oninput="updatePasswordStrength(this.value)"
                required
              >
              <button type="button" class="password-toggle" onclick="togglePassword('registerPassword', this)" aria-label="Show/hide password">👁</button>
            </div>
            <!-- Password Strength Meter -->
            <div class="password-strength" id="passwordStrength">
              <div class="strength-bar-track">
                <div class="strength-bar-fill" id="strengthBarFill"></div>
              </div>
              <span class="strength-label" id="strengthLabel">Enter a password</span>
            </div>
            <div class="field-error" id="registerPasswordError"></div>
          </div>

          <div class="form-error-banner hidden" id="registerErrorBanner"></div>
          <div class="form-success-banner hidden" id="registerSuccessBanner"></div>

          <button type="submit" class="auth-btn" id="registerBtn">
            <span class="auth-btn-text">Create Account</span>
            <span class="auth-btn-spinner hidden" id="registerSpinner">
              <span class="spinner-dot"></span>
              <span class="spinner-dot"></span>
              <span class="spinner-dot"></span>
            </span>
          </button>
        </form>

        <!-- Google Sign-In -->
        <div class="google-divider"><span>or</span></div>
        <button class="google-btn" id="registerGoogleBtn" onclick="handleGoogleSignIn()" type="button">
          <svg class="google-logo" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          <span class="google-btn-text">Continue with Google</span>
          <span class="google-btn-spinner hidden" id="registerGoogleSpinner">
            <span class="spinner-dot"></span>
            <span class="spinner-dot"></span>
            <span class="spinner-dot"></span>
          </span>
        </button>

        <div class="auth-divider">
          <span>Already have an account?</span>
        </div>
        <button class="auth-switch-btn" onclick="switchToLogin()">
          Sign in instead →
        </button>
      </div>

    </div><!-- /auth-card -->

    <!-- Trust indicators -->
    <div class="auth-trust">
      <span>🔒 End-to-end secure</span>
      <span>·</span>
      <span>🛡️ Your data stays private</span>
      <span>·</span>
      <span>💜 Always free</span>
    </div>
  </main>

  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
